version: 2

models:
  - name: fct_job_postings
    description: "Bảng dữ liệu tin tuyển dụng trung tâm. Chế độ Incremental, Partition theo ngày đăng."
    columns:
      - name: job_id
        tests:
          - unique
          - not_null
      - name: company_id
        description: "Khóa ngoại nối sang dim_companies (có thể null nếu tin không gắn công ty)"
        tests:
          - relationships:
              arguments:
                to: ref('dim_companies')
                field: company_id
                where: "company_id is not null"
      - name: work_type
        tests:
          - accepted_values:
              arguments:
                values: ['Contract', 'Full-time', 'Part-time', 'Volunteer', 'Other', 'Internship']
                quote: true

  - name: dim_companies
    description: "Bảng danh mục công ty tích hợp quy mô nhân sự và ngành nghề tinh lọc."
    columns:
      - name: company_id
        tests:
          - unique
          - not_null
