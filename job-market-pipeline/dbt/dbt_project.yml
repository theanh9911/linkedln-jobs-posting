name: 'job_market_pipeline'
version: '1.0.0'
config-version: 2

profile: 'job_market_bq'

model-paths: ["models"]
analysis-paths: ["analyses"]
test-paths: ["tests"]
seed-paths: ["seeds"]
macro-paths: ["macros"]
snapshot-paths: ["snapshots"]

target-path: "target"
clean-targets:
  - "target"
  - "dbt_packages"

models:
  job_market_pipeline:
    staging:
      +materialized: view
    marts:
      +materialized: table
      +schema: "{{ env_var('BQ_MARTS_DATASET', 'job_market_marts') }}"
